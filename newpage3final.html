<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css"  href="newpage.css">
    <link rel="icon" type="image/jpeg" href="favicon.jpeg">
    <script src="https://kit.fontawesome.com/45a680a5be.js"></script>
    <title>Flashcard Deck</title>
</head>
<body>
    <input type="checkbox" id="nav-toggle">
    <div class="sidebar">
        <div class="sidebar-brand">
            <h2><i class="fa-solid fa-book-open"></i> <span> Flip n Learn</span></h2>
        </div>
        <div class="sidebar-menu">
            <ul>
                <li>
                    <a href="dashboard.html" ><i class="fa-solid fa-house"></i><span> Home</span></a>
                </li>
                <li>
                    <a href="recents.html"><i class="fa-solid fa-folder-open"></i><span> Recents</span></a>
                </li>
                <li>
                    <a href="favourites.html"><i class="fa-solid fa-heart"></i><span> Favourites</span></a>
                </li>
                <li>
                    <a href="quizlet2.html"><i class="fa-solid fa-plus"></i><span> Create New</span></a>
                </li>
                <li>
                    <a href="Savedflashcards.html"><i class="fa-solid fa-bookmark"></i><span> Saved Flashcards</span></a>
                </li>
            </ul>
        </div>
    </div>
    <div class="main-content">
        <header>
            <h2>
                <label for="nav-toggle">
                <div class="header-title"><i class="fa-solid fa-bars"></i> Home</div>
                </label>
            </h2>
            <div class="search-wrapper"><i class="fa-solid fa-search"></i>
            <input type="search" placeholder="Search here" />
            </div>
            <div class="user-wrapper">
                <label for="profile-upload" class="avatar-placeholder">
                    <img id="profile-pic" alt="Profile" style="display:none;" /> <!-- Initially hidden -->
                    <i id="profile-icon" class="fas fa-user"></i> <!-- Profile icon -->
                </label>
                <h4>Profile</h4>
            </div>    
            <input type="file" id="profile-upload" accept="image/*" style="display: none;" />
        </header>

    <div class="flashcard-container">
        <div class="flashcard">
            <!-- Front Side -->
            <div class="flashcard-inner flashcard-front">
                <p id="flashcard-title">Flashcard Title</p>
            </div>
            <!-- Back Side -->
            <div class="flashcard-inner flashcard-back">
                <div class="back-content">
                    <p class="term" id="flashcard-term"><strong>Term:</strong> Term goes here</p>
                    <p class="description" id="flashcard-description"><strong>Description:</strong> Description goes here</p>
                    <p class="definition" id="flashcard-definition"><strong>Definition:</strong> Definition goes here</p>
                    <img id="flashcard-image" src="https://via.placeholder.com/300" alt="Flashcard Image">
                    <audio id="flashcard-audio" controls>
                        <source src="audio-file-url.mp3" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load flashcard data from localStorage
        document.addEventListener('DOMContentLoaded', function () {
            const title = localStorage.getItem('title');
            const flashcards = JSON.parse(localStorage.getItem('flashcardSet')) || [];

            console.log("Loaded flashcards from localStorage:", flashcards);

            // Check if there are flashcards
            if (flashcards.length > 0) {
                const card = flashcards[0]; // Display the first flashcard as an example
                document.getElementById('flashcard-title').textContent = title || 'Flashcard Title';
                document.getElementById('flashcard-term').textContent = `Term: ${card.term || 'No term provided'}`;
                document.getElementById('flashcard-description').textContent = `Description: ${card.description || 'No description provided'}`;
                document.getElementById('flashcard-definition').textContent = `Definition: ${card.definition || 'No definition provided'}`;

                if (card.image) {
                    document.getElementById('flashcard-image').src = card.image;
                } else {
                    console.log("No image provided for this card.");
                }

                if (card.audio) {
                    document.getElementById('flashcard-audio').src = card.audio;
                } else {
                    console.log("No audio provided for this card.");
                }
            } else {
                console.log("No flashcards found in localStorage.");
            }
        });
    </script>

</body>
</html>
