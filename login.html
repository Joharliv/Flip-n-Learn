<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpeg">
    <script src="https://kit.fontawesome.com/45a680a5be.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Poppins:wght@600&display=swap');

body {
    background: linear-gradient(154.5deg, #00072f 50%,#ffffff 50%);
    color: #f0f0f0;
    font-family: 'Roboto', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    flex-direction: column;
}

/* Tagline Style */
.tagline {
    font-size: 36px;
    margin-bottom: 30px;
    color: #fff;
    text-align: center;
    font-family: 'Poppins', sans-serif;
    letter-spacing: 2px;
}

.login-container {
    background-color: #ffffff;
    padding: 38px;
    border-radius: 12px;
    box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
    max-width: 400px;
    width: 100%;
}

.login-container h1 {
    color: #333;
    text-align: center;
    margin-bottom: 30px;
    font-size: 26px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
}

.input-field {
    width: 370px;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    background-color: #f9f9f9;
    transition: all 0.3s ease;
}
.input-field:focus {
    outline: none;
    border-color: #323334;
    box-shadow: 0 0 8px rgba(76, 129, 175, 0.5);
}
.login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 20px 0;
    font-size: 14px;
}
.login-options a {
    color: #333434;
    text-decoration: none;
}
.login-options a:hover {
    text-decoration: underline;
}

.btn-login {
    width: 100%;
    padding: 15px;
    background-color: #020e54;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.3s ease;
}

.btn-login:hover {
    background-color:#100451;
    transform: translateY(-3px);
}

.remember-me {
    display: flex;
    align-items: center;
    color: darkgray;
}

.remember-me input {
    margin-right: 10px;
}
.signin{
    color: rgb(35, 34, 34) ;
    margin-left: 70px;
}
    </style>
</head>
<body>
    <div class="tagline">Start Learning With Us!</div>
    <div class="login-container">
        <h1>Login <i class="fa-solid fa-user"></i></h1>
        <form id="loginForm">
            <input type="text" id="loginUsername" class="input-field" placeholder="Username" autocomplete="off" required>
            <input type="password" id="loginPassword" class="input-field" placeholder="Password" autocomplete="off" required>
            
            <div class="login-options">
                <div class="remember-me">
                    <input type="checkbox" id="check">
                    <label for="check">Remember me</label>
                </div>
                <a href="#">Forgot Password?</a>
            </div>

            <input type="submit" class="btn-login" value="Log In">
            <br><br>
            <div class="signin">Don't have an account? <a href="signup.html">Create one!!</a></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            // Retrieve user data from localStorage
            const storedUser = JSON.parse(localStorage.getItem('userData'));

            if (storedUser && storedUser.username === username && storedUser.password === password) {
                alert("Login successful!");
                window.location.href = "dashboard.html";
            } else {
                alert("Incorrect username or Password");
            }
        });
    </script>
</body>
</html>
