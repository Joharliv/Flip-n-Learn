<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip n Learn - Create Flashcards</title>
    <link rel="icon" type="image/jpeg" href="images/favicon.jpeg">
    <script src="https://kit.fontawesome.com/45a680a5be.js"></script>
    <link rel="stylesheet" type="text/css" href="quizlet2final.css">
</head>

<body>
    <input type="checkbox" id="nav-toggle">
    <div class="sidebar">
        <div class="sidebar-brand">
            <h2><i class="fa-solid fa-book-open"></i> <span> Flip n Learn</span></h2>
        </div>
        <div class="sidebar-menu">
            <ul>
                <li>
                    <a href="dashboard.html"><i class="fa-solid fa-house"></i><span> Home</span></a>
                </li>
                <li>
                    <a href="recents.html"><i class="fa-solid fa-folder-open"></i><span> Recents</span></a>
                </li>
                <li>
                    <a href="favourites.html"><i class="fa-solid fa-heart"></i><span> Favourites</span></a>
                </li>
                <li>
                    <a href="quizlet2.html"><i class="fa-solid fa-plus"></i><span> Create New</span></a>
                </li>
                <li>
                    <a href="Savedflashcards.html"><i class="fa-solid fa-bookmark"></i><span> Saved Flashcards</span></a>
                </li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <header>
            <h2>
                <label for="nav-toggle">
                    <div class="header-title"><i class="fa-solid fa-bars"></i> Create New</div>
                </label>
            </h2>
            <div class="search-wrapper"><i class="fa-solid fa-search"></i>
                <input type="search" placeholder="Search here" />
            </div>
            <div class="user-wrapper">
                <label for="profile-upload" class="avatar-placeholder">
                    <img id="profile-pic" alt="Profile" style="display:none;" /> <!-- Initially hidden -->
                    <i id="profile-icon" class="fas fa-user"></i> <!-- This is the icon that will be replaced by the image -->
                </label>
                <input type="file" id="profile-upload" accept="image/*" style="display: none;" />
                <h4>Profile</h4>
        </header>
    </div>

    <h1 class="heading">Create a New Flashcard Set</h1>
    <input type="text" placeholder="Enter a title" id="title">
    <textarea placeholder="Add a description..." id="description" rows="10" cols="10"></textarea>
    <img src="images/Untitled.png" style="width:25%; height:47%; float: right; border-radius: 20%; margin-bottom: 60px; position: absolute; padding: 15px 0px 10px 10px;">


    <section class="flashcards" id="flashcards">
        <div class="flashcard">
            <input type="text" placeholder="Enter term" class="term">
            <input type="text" placeholder="Enter definition" class="definition">
            <div>
                <input type="file" class="image" accept="image/*"> Add Image
            </div>
            <div>
                <input type="file" class="audio" accept="audio/*"> Add Audio
            </div>
        </div>
    </section>

    <div class="actions">
        <button id="add-flashcard">+ Add Flashcard</button>
        <button id="create-set">Create and Practice</button>
    </div>

    <script>
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("FlashcardDB", 1);
                request.onerror = event => reject("Database error: " + event.target.error);
                request.onsuccess = event => resolve(event.target.result);
                request.onupgradeneeded = event => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("flashcards")) {
                        db.createObjectStore("flashcards", { keyPath: "id", autoIncrement: true });
                    }
                };
            });
        }
        async function saveFlashcardsToIndexedDB(set) {
            try {
                const db = await openDB();
                const transaction = db.transaction("flashcards", "readwrite");
                const store = transaction.objectStore("flashcards");

                store.add(set);
                transaction.oncomplete = () => console.log("Flashcards saved successfully.");
                transaction.onerror = event => console.error("Error saving flashcards:", event.target.error);
            } catch (error) {
                console.error("Error accessing IndexedDB:", error);
            }
        }

        document.getElementById('add-flashcard').addEventListener('click', () => {
            const flashcardContainer = document.querySelector('.flashcards');
            const flashcard = document.createElement('div');
            flashcard.classList.add('flashcard');
            flashcard.innerHTML = `
                <input type="text" placeholder="Enter term" class="term">
                <input type="text" placeholder="Enter definition" class="definition">
                <div><input type="file" class="image" accept="image/*"> Add Image</div>
                <div><input type="file" class="audio" accept="audio/*"> Add Audio</div>
            `;
            flashcardContainer.appendChild(flashcard);
        });

        document.getElementById('create-set').addEventListener('click', async () => {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const flashcards = [];

            for (const flashcard of document.querySelectorAll('.flashcard')) {
                const term = flashcard.querySelector('.term').value;
                const definition = flashcard.querySelector('.definition').value;
                const imageFiles = flashcard.querySelector('.image').files;
                const audioFiles = flashcard.querySelector('.audio').files;

                const images = await Promise.all(Array.from(imageFiles).map(toBase64));
                const audio = await Promise.all(Array.from(audioFiles).map(toBase64));

                if (term && definition) {
                    flashcards.push({ term, definition, images, audio });
                }
            }

            if (title && description && flashcards.length > 0) {
                await saveFlashcardsToIndexedDB({ title, description, flashcards });
                window.location.href = 'FlashcardDisplay2.html'; // Redirect to display page
            } else {
                alert("Please fill all fields and add at least one flashcard.");
            }
        });

        document.getElementById('nav-toggle').addEventListener('change', function () {
    const img = document.querySelector('img[src="images/Untitled.png"]');
    if (this.checked) {
        img.style.width = '500px';
        img.style.marginLeft = '40px';
    } else {
        img.style.width = '25%'; // Reset to original width
    }
});

    </script>
    <script src="dashboard.js"></script>
</body>

</html>
